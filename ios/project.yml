name: PrivateMoments
options:
  bundleIdPrefix: local.private-moments
  deploymentTarget:
    iOS: "17.0"
targets:
  PrivateMoments:
    type: application
    platform: iOS
    supportedDestinations:
      - iOS
    deploymentTarget: "17.0"
    sources:
      - PrivateMoments
    dependencies:
      - sdk: libsqlite3.tbd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.popcornnnnnn.privatemoments
        PRODUCT_NAME: Moments
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: R26X7B8XDT
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 2
        SWIFT_VERSION: 5.0
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: PrivateMoments/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: 1
schemes:
  PrivateMoments:
    shared: true
    build:
      targets:
        PrivateMoments: all
    run:
      config: Debug
    archive:
      config: Release
