name: PrivateMoments
options:
  bundleIdPrefix: local.private-moments
  deploymentTarget:
    iOS: "17.0"
targets:
  PrivateMoments:
    type: application
    platform: iOS
    supportedDestinations:
      - iOS
    deploymentTarget: "17.0"
    sources:
      - PrivateMoments
      - Shared
    dependencies:
      - sdk: libsqlite3.tbd
      - target: MomentsShareExtension
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.popcornnnnnn.privatemoments
        PRODUCT_NAME: $(TARGET_NAME)
        PRODUCT_MODULE_NAME: PrivateMoments
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: R26X7B8XDT
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 2
        PRIVATE_MOMENTS_FALLBACK_SERVER_URL: ""
        SWIFT_VERSION: 5.0
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: PrivateMoments/Info.plist
        CODE_SIGN_ENTITLEMENTS: PrivateMoments/PrivateMoments.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: 1
  MomentsShareExtension:
    type: app-extension
    platform: iOS
    supportedDestinations:
      - iOS
    deploymentTarget: "17.0"
    sources:
      - ShareExtension
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.popcornnnnnn.privatemoments.share
        PRODUCT_NAME: Save to Moments
        PRODUCT_MODULE_NAME: MomentsShareExtension
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: R26X7B8XDT
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 2
        SWIFT_VERSION: 5.0
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: ShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: ShareExtension/ShareExtension.entitlements
        TARGETED_DEVICE_FAMILY: 1
        APPLICATION_EXTENSION_API_ONLY: YES
  PrivateMomentsTests:
    type: bundle.unit-test
    platform: iOS
    supportedDestinations:
      - iOS
    deploymentTarget: "17.0"
    sources:
      - PrivateMomentsTests
    dependencies:
      - target: PrivateMoments
    hostApplication: PrivateMoments
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.popcornnnnnn.privatemoments.tests
        PRODUCT_NAME: PrivateMomentsTests
        PRODUCT_MODULE_NAME: PrivateMomentsTests
        SWIFT_VERSION: 5.0
        GENERATE_INFOPLIST_FILE: YES
  PrivateMomentsListContinuationTests:
    type: bundle.unit-test
    platform: iOS
    supportedDestinations:
      - iOS
    deploymentTarget: "17.0"
    sources:
      - PrivateMomentsListContinuationTests
    dependencies:
      - target: PrivateMoments
    hostApplication: PrivateMoments
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.popcornnnnnn.privatemoments.list-continuation-tests
        PRODUCT_NAME: PrivateMomentsListContinuationTests
        PRODUCT_MODULE_NAME: PrivateMomentsListContinuationTests
        SWIFT_VERSION: 5.0
        GENERATE_INFOPLIST_FILE: YES
schemes:
  PrivateMoments:
    shared: true
    build:
      targets:
        PrivateMoments: all
        MomentsShareExtension: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PrivateMomentsTests
    archive:
      config: Release
  PrivateMomentsListContinuationTests:
    shared: true
    build:
      targets:
        PrivateMoments: all
        PrivateMomentsListContinuationTests: [test]
    test:
      config: Debug
      targets:
        - PrivateMomentsListContinuationTests
