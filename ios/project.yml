name: PrivateMoments
options:
  bundleIdPrefix: local.private-moments
  deploymentTarget:
    iOS: "17.0"
targets:
  PrivateMoments:
    type: application
    platform: iOS
    supportedDestinations:
      - iOS
    deploymentTarget: "17.0"
    sources:
      - PrivateMoments
    dependencies:
      - sdk: libsqlite3.tbd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.popcornnnnnn.privatemoments
        PRODUCT_NAME: $(TARGET_NAME)
        PRODUCT_MODULE_NAME: PrivateMoments
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: R26X7B8XDT
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 2
        SWIFT_VERSION: 5.0
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: PrivateMoments/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: 1
  PrivateMomentsTests:
    type: bundle.unit-test
    platform: iOS
    supportedDestinations:
      - iOS
    deploymentTarget: "17.0"
    sources:
      - PrivateMomentsTests
    dependencies:
      - target: PrivateMoments
    hostApplication: PrivateMoments
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.popcornnnnnn.privatemoments.tests
        PRODUCT_NAME: PrivateMomentsTests
        PRODUCT_MODULE_NAME: PrivateMomentsTests
        SWIFT_VERSION: 5.0
        GENERATE_INFOPLIST_FILE: YES
schemes:
  PrivateMoments:
    shared: true
    build:
      targets:
        PrivateMoments: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PrivateMomentsTests
    archive:
      config: Release
