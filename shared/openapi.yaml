    SyncOperation:
      type: object
      required:
        - opId
        - type
        - entityType
        - entityId
        - clientCreatedAt
        - payload
      properties:
        opId:
          type: string
          format: uuid
        type:
          type: string
          enum:
            - create_post
            - delete_post
            - update_post
            - insert_ai_title
            - update_post_favorite
            - create_comment
            - delete_comment
            - update_media_transcription
            - upsert_media
            - upsert_tag
            - archive_tag
            - restore_tag
            - delete_tag
            - merge_tag
            - upsert_tag_alias
            - delete_tag_alias
            - set_post_tags
        entityType:
          type: string
          enum:
            - post
            - comment
            - media
            - tag
            - tag_alias
        entityId:
          type: string
          format: uuid
        clientCreatedAt:
          type: string
          format: date-time
        payload:
          type: object
          description: >
            Operation-specific payload. `create_comment` uses `entityType: comment`,
            `entityId` as the comment id, and payload `{postId, text, createdAt}`.
            `text` is plain text and must be non-empty and at most 500 characters.
            `delete_comment` uses payload `{postId, deletedAt}`. Server changes include
            `comment_created` with `{id, postId, text, createdAt, updatedAt, deletedAt}`
            and `comment_deleted` with `{id, postId, deletedAt}`.
            `update_media_transcription` is retained for older clients. It uses
            `entityType: media` and payload `{postId, transcriptionText, updatedAt}`;
            server changes include `media_transcription_updated` with
            `{id, postId, transcriptionText, updatedAt}`.
            Tag vocabulary operations use `upsert_tag`, `archive_tag`,
            `restore_tag`, `delete_tag`, `merge_tag`, `upsert_tag_alias`, and
            `delete_tag_alias`. Post assignments use `set_post_tags` with
            payload `{primaryTagId, topicTagIds, updatedAt}`. Server changes
            include `tag_updated`, `tag_deleted`, `tag_alias_updated`, `tag_alias_deleted`,
            `post_tag_updated`, `post_tag_deleted`, and
            `post_tag_state_updated`.
            `insert_ai_title` uses `entityType: post` with payload
            `{summaryId, mediaId, insertedAt}`. The title text is not sent by
            the client; the server reloads it from a ready audio AI summary and
            emits `post_updated` with `updateSource: ai_title` when it changes
            the post text.
          additionalProperties: true
    SyncResponse:
      type: object
      required:
        - serverVersion
        - schemaVersion
        - acceptedOps
        - rejectedOps
        - serverChanges
        - nextSyncCursor
      properties:
        serverVersion:
          type: string
        schemaVersion:
          type: integer
        acceptedOps:
          type: array
          items:
            type: string
        rejectedOps:
          type: array
          items:
            type: object
            required:
              - opId
              - reason
            properties:
              opId:
                type: string
              reason:
                type: string
        serverChanges:
          type: array
          items:
            type: object
            additionalProperties: true
        nextSyncCursor:
          type: integer
