openapi: 3.1.0
info:
  title: Private Moments API
  version: 0.1.0
  description: API contract for the Mac server used by the iOS app and admin UI.
servers:
  - url: http://127.0.0.1:3210
security:
  - bearerAuth: []
paths:
  /api/v1/health:
    get:
      summary: Check server health and schema versions.
      security: []
      responses:
        "200":
          description: Server is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/v1/auth/login:
    post:
      summary: Exchange the single-user password for a long-lived device token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
  /api/v1/devices:
    get:
      summary: List authorized devices.
      responses:
        "200":
          description: Devices.
          content:
            application/json:
              schema:
                type: object
                required:
                  - devices
                properties:
                  devices:
                    type: array
                    items:
                      $ref: "#/components/schemas/Device"
  /api/v1/devices/{deviceId}:
    delete:
      summary: Revoke an authorized device.
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Device revoked.
          content:
            application/json:
              schema:
                type: object
                required:
                  - device
                properties:
                  device:
                    $ref: "#/components/schemas/Device"
  /api/v1/sync:
    post:
      summary: Push local device changes and pull server changes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncRequest"
      responses:
        "200":
          description: Sync completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResponse"
  /api/v1/ai/media-summary:
    post:
      summary: Generate or regenerate an AI summary for one audio/video media file.
      description: >
        The Mac server transcribes the stored audio/video media file locally, then
        calls the configured external Chat Completions provider with the internal
        transcript. Provider credentials stay server-side, and the iOS client only
        receives generated summary metadata and lightweight failure status.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaSummaryRequest"
      responses:
        "200":
          description: Summary status or generated summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaSummaryResponse"
  /api/v1/ai/media-summary/{summaryId}:
    delete:
      summary: Soft delete one generated AI media summary.
      parameters:
        - name: summaryId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Deleted summary metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaSummaryResponse"
  /api/v1/reviews:
    get:
      summary: List generated periodic reviews.
      parameters:
        - name: kind
          in: query
          required: false
          schema:
            type: string
            enum:
              - weekly
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Reviews.
          content:
            application/json:
              schema:
                type: object
                required:
                  - reviews
                properties:
                  reviews:
                    type: array
                    items:
                      $ref: "#/components/schemas/Review"
  /api/v1/reviews/{reviewId}:
    get:
      summary: Read one generated periodic review.
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Review.
          content:
            application/json:
              schema:
                type: object
                required:
                  - review
                properties:
                  review:
                    $ref: "#/components/schemas/Review"
    delete:
      summary: Soft delete one generated periodic review.
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted review.
          content:
            application/json:
              schema:
                type: object
                required:
                  - review
                properties:
                  review:
                    $ref: "#/components/schemas/Review"
  /api/v1/reviews/generate:
    post:
      summary: Generate a periodic review.
      description: >
        The first supported kind is `weekly`. `rolling_7_days` uses the request
        time as the range end unless an explicit range is supplied. Explicit
        generation ranges must be 35 days or less; provider input is capped at
        240 moments to bound private-data exposure, latency, and cost.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateReviewRequest"
      responses:
        "200":
          description: Generated review artifact.
          content:
            application/json:
              schema:
                type: object
                required:
                  - review
                properties:
                  review:
                    $ref: "#/components/schemas/Review"
  /api/v1/reviews/{reviewId}/regenerate:
    post:
      summary: Regenerate a periodic review as a new artifact.
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: New generated review artifact.
          content:
            application/json:
              schema:
                type: object
                required:
                  - review
                properties:
                  review:
                    $ref: "#/components/schemas/Review"
  /api/v1/reviews/{reviewId}/feedback:
    post:
      summary: Save lightweight feedback for a generated review.
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewFeedbackRequest"
      responses:
        "200":
          description: Feedback saved.
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                properties:
                  ok:
                    type: boolean
  /api/v1/reviews/{reviewId}/publish:
    post:
      summary: Publish one ready review as an explicit moment.
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Published post.
          content:
            application/json:
              schema:
                type: object
                required:
                  - postId
                  - review
                properties:
                  postId:
                    type: string
                  review:
                    $ref: "#/components/schemas/Review"
  /api/v1/reviews/settings:
    get:
      summary: Read periodic review settings.
      responses:
        "200":
          description: Review settings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewSettings"
    put:
      summary: Update periodic review settings.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewSettings"
      responses:
        "200":
          description: Review settings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewSettings"
  /api/v1/media/upload:
    post:
      summary: Upload a media file for a post.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - mediaId
                - postId
                - variant
                - file
              properties:
                mediaId:
                  type: string
                  format: uuid
                postId:
                  type: string
                  format: uuid
                variant:
                  type: string
                  enum:
                    - compressed
                    - original
                    - thumbnail
                kind:
                  type: string
                  enum:
                    - image
                    - video
                    - audio
                  default: image
                mimeType:
                  type: string
                durationSeconds:
                  type: number
                transcriptionText:
                  type: string
                  description: Legacy optional transcript metadata for older clients; new iOS uploads omit it.
                originalPreserved:
                  type: boolean
                  default: false
                sortOrder:
                  type: integer
                  default: 0
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Upload accepted.
          content:
            application/json:
              schema:
                type: object
                required:
                  - media
                properties:
                  media:
                    type: object
                    required:
                      - id
                      - postId
                      - variant
                      - status
                      - path
                      - sizeBytes
                      - checksum
                    properties:
                      id:
                        type: string
                        format: uuid
                      postId:
                        type: string
                        format: uuid
                      variant:
                        type: string
                      status:
                        type: string
                      path:
                        type: string
                      sizeBytes:
                        type: integer
                      checksum:
                        type: string
  /api/v1/media/batch-download:
    post:
      summary: Download multiple media variants as base64 JSON payloads.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - mediaIds
              properties:
                mediaIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                variant:
                  type: string
                  default: thumbnail
                  enum:
                    - compressed
                    - original
                    - thumbnail
      responses:
        "200":
          description: Downloadable media payloads. Missing or deleted media are skipped.
          content:
            application/json:
              schema:
                type: object
                required:
                  - media
                properties:
                  media:
                    type: array
                    items:
                      $ref: "#/components/schemas/MediaBatchDownloadItem"
  /api/v1/media/{mediaId}:
    get:
      summary: Download a media variant.
      parameters:
        - name: mediaId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: variant
          in: query
          schema:
            type: string
            default: compressed
            enum:
              - compressed
              - original
              - thumbnail
      responses:
        "200":
          description: Media bytes.
          content:
            image/*:
              schema:
                type: string
                format: binary
  /api/v1/timeline:
    get:
      summary: Read server timeline.
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Timeline page.
          content:
            application/json:
              schema:
                type: object
                required:
                  - posts
                properties:
                  posts:
                    type: array
                    items:
                      $ref: "#/components/schemas/Post"
                  nextCursor:
                    type:
                      - string
                      - "null"
  /api/v1/posts/{postId}:
    get:
      summary: Read one post by ID.
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Post.
          content:
            application/json:
              schema:
                type: object
                required:
                  - post
                properties:
                  post:
                    $ref: "#/components/schemas/Post"
  /api/v1/search:
    get:
      summary: Search server archive by post text, comments, and historical media transcript metadata.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Search results.
          content:
            application/json:
              schema:
                type: object
                required:
                  - posts
                properties:
                  posts:
                    type: array
                    items:
                      $ref: "#/components/schemas/Post"
  /api/v1/admin/status:
    get:
      summary: Read operational status and storage diagnostics.
      responses:
        "200":
          description: Admin status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStatusResponse"
  /api/v1/admin/logs:
    get:
      summary: Read recent server logs for the Mac admin UI.
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: Recent logs.
          content:
            application/json:
              schema:
                type: object
                required:
                  - logs
                properties:
                  logs:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
  /api/v1/admin/maintenance/state:
    get:
      summary: Read current maintenance mode state and the running maintenance job.
      responses:
        "200":
          description: Maintenance state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMaintenanceStateResponse"
  /api/v1/admin/maintenance/jobs:
    get:
      summary: List recent maintenance jobs.
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 25
            minimum: 1
            maximum: 100
        - name: type
          in: query
          schema:
            $ref: "#/components/schemas/MaintenanceJobType"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/MaintenanceJobStatus"
      responses:
        "200":
          description: Maintenance jobs.
          content:
            application/json:
              schema:
                type: object
                required:
                  - jobs
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: "#/components/schemas/MaintenanceJob"
  /api/v1/admin/maintenance/jobs/{jobId}:
    get:
      summary: Read one maintenance job.
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Maintenance job.
          content:
            application/json:
              schema:
                type: object
                required:
                  - job
                properties:
                  job:
                    $ref: "#/components/schemas/MaintenanceJob"
  /api/v1/admin/maintenance/jobs/sync-health-refresh:
    post:
      summary: Create and run a safe sync-health refresh job.
      responses:
        "200":
          description: Completed sync-health refresh job.
          content:
            application/json:
              schema:
                type: object
                required:
                  - job
                properties:
                  job:
                    $ref: "#/components/schemas/MaintenanceJob"
  /api/v1/admin/archive/repository:
    get:
      summary: Read restic backup repository state.
      responses:
        "200":
          description: Archive repository state.
          content:
            application/json:
              schema:
                type: object
                required:
                  - repository
                properties:
                  repository:
                    $ref: "#/components/schemas/ArchiveRepositoryState"
    post:
      summary: Configure the backup repository path.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - repositoryPath
              properties:
                repositoryPath:
                  type: string
      responses:
        "200":
          description: Updated archive repository state.
          content:
            application/json:
              schema:
                type: object
                required:
                  - repository
                properties:
                  repository:
                    $ref: "#/components/schemas/ArchiveRepositoryState"
  /api/v1/admin/archive/repository/init:
    post:
      summary: Initialize the configured restic repository.
      responses:
        "200":
          description: Initialized archive repository state.
          content:
            application/json:
              schema:
                type: object
                required:
                  - repository
                properties:
                  repository:
                    $ref: "#/components/schemas/ArchiveRepositoryState"
  /api/v1/admin/archive/schedule:
    post:
      summary: Configure daily backup schedule.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - enabled
                - timeOfDay
              properties:
                enabled:
                  type: boolean
                timeOfDay:
                  type: string
                  pattern: "^([01]\\d|2[0-3]):([0-5]\\d)$"
      responses:
        "200":
          description: Updated archive repository state.
          content:
            application/json:
              schema:
                type: object
                required:
                  - repository
                properties:
                  repository:
                    $ref: "#/components/schemas/ArchiveRepositoryState"
  /api/v1/admin/archive/snapshots:
    get:
      summary: List restic backup snapshots.
      responses:
        "200":
          description: Archive snapshots.
          content:
            application/json:
              schema:
                type: object
                required:
                  - snapshots
                properties:
                  snapshots:
                    type: array
                    items:
                      $ref: "#/components/schemas/ArchiveSnapshot"
  /api/v1/admin/archive/jobs/backup:
    post:
      summary: Start a manual backup job.
      responses:
        "202":
          description: Backup job started.
          content:
            application/json:
              schema:
                type: object
                required:
                  - job
                properties:
                  job:
                    $ref: "#/components/schemas/MaintenanceJob"
  /api/v1/admin/archive/jobs/check:
    post:
      summary: Start a repository check job.
      responses:
        "202":
          description: Repository check job started.
          content:
            application/json:
              schema:
                type: object
                required:
                  - job
                properties:
                  job:
                    $ref: "#/components/schemas/MaintenanceJob"
  /api/v1/admin/archive/jobs/restore:
    post:
      summary: Restore one snapshot into a new data directory.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - snapshotId
              properties:
                snapshotId:
                  type: string
                restoreName:
                  type: string
      responses:
        "202":
          description: Restore job started.
          content:
            application/json:
              schema:
                type: object
                required:
                  - job
                properties:
                  job:
                    $ref: "#/components/schemas/MaintenanceJob"
  /api/v1/admin/archive/jobs/promote:
    post:
      summary: Prepare a verified restored archive for promotion after strong confirmation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - restoredDataDir
                - confirmation
              properties:
                restoredDataDir:
                  type: string
                confirmation:
                  type: string
      responses:
        "202":
          description: Promote preparation job started.
          content:
            application/json:
              schema:
                type: object
                required:
                  - job
                properties:
                  job:
                    $ref: "#/components/schemas/MaintenanceJob"
  /api/v1/admin/archive/jobs/export:
    post:
      summary: Create a migration-first export package.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                from:
                  type: string
                  format: date-time
                to:
                  type: string
                  format: date-time
      responses:
        "202":
          description: Export job started.
          content:
            application/json:
              schema:
                type: object
                required:
                  - job
                properties:
                  job:
                    $ref: "#/components/schemas/MaintenanceJob"
  /api/v1/admin/archive/jobs/import:
    post:
      summary: Import an export package into a new staged data directory.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - packagePath
              properties:
                packagePath:
                  type: string
                importName:
                  type: string
      responses:
        "202":
          description: Import job started.
          content:
            application/json:
              schema:
                type: object
                required:
                  - job
                properties:
                  job:
                    $ref: "#/components/schemas/MaintenanceJob"
  /api/v1/admin/posts:
    get:
      summary: List posts for the Mac Admin Posts page.
      parameters:
        - name: deleted
          in: query
          schema:
            type: string
            default: active
            enum:
              - active
              - deleted
              - all
        - name: deviceId
          in: query
          schema:
            type: string
            format: uuid
        - name: q
          in: query
          schema:
            type: string
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Admin post list.
          content:
            application/json:
              schema:
                type: object
                required:
                  - posts
                  - nextCursor
                  - searchLimited
                properties:
                  posts:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminPost"
                  nextCursor:
                    type:
                      - string
                      - "null"
                  searchLimited:
                    type: boolean
  /api/v1/admin/posts/{postId}:
    get:
      summary: Read one Admin post detail.
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Admin post detail.
          content:
            application/json:
              schema:
                type: object
                required:
                  - post
                properties:
                  post:
                    $ref: "#/components/schemas/AdminPost"
    delete:
      summary: Soft delete one post from Admin.
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Soft-deleted post.
          content:
            application/json:
              schema:
                type: object
                required:
                  - post
                properties:
                  post:
                    anyOf:
                      - $ref: "#/components/schemas/AdminPost"
                      - type: "null"
  /api/v1/admin/devices/{deviceId}/clean-posts/preview:
    get:
      summary: Preview permanent cleanup for posts created by one device.
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Cleanup preview.
          content:
            application/json:
              schema:
                type: object
                required:
                  - device
                  - candidateCount
                properties:
                  device:
                    $ref: "#/components/schemas/Device"
                  candidateCount:
                    type: integer
  /api/v1/admin/devices/{deviceId}/clean-posts:
    post:
      summary: Permanently clean posts created by one device.
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - confirmDeviceName
              properties:
                confirmDeviceName:
                  type: string
      responses:
        "200":
          description: Cleanup result.
          content:
            application/json:
              schema:
                type: object
                required:
                  - device
                  - deletedPosts
                  - deletedMediaFiles
                  - failedMediaFiles
                properties:
                  device:
                    $ref: "#/components/schemas/Device"
                  deletedPosts:
                    type: integer
                  deletedMediaFiles:
                    type: integer
                  failedMediaFiles:
                    type: integer
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    HealthResponse:
      type: object
      required:
        - ok
        - serverVersion
        - schemaVersion
        - dataDir
      properties:
        ok:
          type: boolean
        serverVersion:
          type: string
        schemaVersion:
          type: integer
        dataDir:
          type: string
    LoginRequest:
      type: object
      required:
        - password
        - deviceName
        - platform
      properties:
        password:
          type: string
        deviceName:
          type: string
        deviceKey:
          type: string
          description: Stable physical-device or browser-installation key used to rebind repeated logins.
        platform:
          type: string
          enum:
            - ios
            - mac
            - web
    LoginResponse:
      type: object
      required:
        - deviceId
        - deviceToken
        - serverVersion
        - schemaVersion
      properties:
        deviceId:
          type: string
          format: uuid
        deviceToken:
          type: string
        serverVersion:
          type: string
        schemaVersion:
          type: integer
    Device:
      type: object
      required:
        - id
        - name
        - platform
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        platform:
          type: string
        lastSeenAt:
          type:
            - string
            - "null"
          format: date-time
        revokedAt:
          type:
            - string
            - "null"
          format: date-time
